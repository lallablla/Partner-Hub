kind = "web"
previewPath = "/"
title = "마케팅 파트너 대시보드"
version = "1.0.0"
id = "artifacts/partner-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23191

[services.development]
run = "pnpm --filter @workspace/partner-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/partner-dashboard", "run", "build" ]
publicDir = "artifacts/partner-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23191"
BASE_PATH = "/"
